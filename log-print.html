<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>พิมพ์ใบงาน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: #525659;
    }
    .page {
      background: white;
      width: 210mm;
      height: 296mm; /* A bit less to avoid issues */
      display: block;
      margin: 0 auto;
      margin-bottom: 0.5cm;
      box-shadow: 0 0 0.5cm rgba(0,0,0,0.5);
      padding: 1.5cm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    @media print {
      body, .page {
        margin: 0;
        box-shadow: none;
        background: white;
      }
      .page {
        page-break-after: always;
      }
      .no-print {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="no-print text-center p-4 bg-gray-800 text-white sticky top-0 z-50">
    <p class="mb-2">กำลังแสดงผลหน้ารายงานสำหรับพิมพ์</p>
    <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2 px-6 rounded-lg text-sm flex items-center gap-2 mx-auto">
      <i class="fa-solid fa-print"></i> พิมพ์เอกสาร
    </button>
  </div>

  <div id="print-container">
    <!-- Pages will be rendered here by JavaScript -->
  </div>

  <!-- Template for a single page -->
  <template id="log-page-template">
    <div class="page">
      <!-- Header -->
      <div class="border-b-2 border-black pb-2 mb-4">
        <h1 class="text-2xl font-bold text-center">ใบรายงานค่าแรงประจำวัน</h1>
      </div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-1 text-sm mb-4">
        <div><strong>วันที่:</strong> <span data-field="date"></span></div>
        <div><strong>ผู้สั่งงาน:</strong> <span data-field="supervisor"></span></div>
        <div><strong>ไซต์งาน/โครงการ:</strong> <span data-field="site"></span></div>
        <div><strong>รายละเอียดงาน:</strong> <span data-field="detail"></span></div>
      </div>

      <!-- Worker Table -->
      <div class="flex-grow">
        <table class="w-full text-left border-collapse text-xs">
          <thead>
            <tr class="bg-slate-100">
              <th class="p-2 border border-slate-300">ชื่อคนงาน</th>
              <th class="p-2 border border-slate-300 text-right">ค่าแรงพื้นฐาน</th>
              <th class="p-2 border border-slate-300 text-center">ระยะเวลาทำงาน</th>
              <th class="p-2 border border-slate-300 text-right">ค่าแรงดิบ</th>
              <th class="p-2 border border-slate-300 text-right">เพิ่ม+20%</th>
              <th class="p-2 border border-slate-300 text-right">ค่าแรงเหมา</th>
              <th class="p-2 border border-slate-300 text-right">OT</th>
              <th class="p-2 border border-slate-300 text-right">ยอดรับสุทธิ</th>
            </tr>
          </thead>
          <tbody data-field="worker-table-body"></tbody>
        </table>

        <!-- Summary -->
        <div class="grid grid-cols-2 gap-4 mt-4 text-sm">
          <div class="space-y-1">
            <div class="flex justify-between"><span>ยอดรวมค่าแรงเหมา:</span> <span data-field="summary-flat" class="font-semibold"></span></div>
            <div class="flex justify-between"><span>ยอดรวมค่าแรง(รายวัน):</span> <span data-field="summary-daily" class="font-semibold"></span></div>
            <div class="flex justify-between"><span>ยอดรวมค่าดำเนินการ (+20%):</span> <span data-field="summary-bonus" class="font-semibold"></span></div>
          </div>
          <div class="flex flex-col items-center justify-center bg-slate-100 p-2 rounded-lg">
            <span class="font-bold">รวมเงินทั้งหมดสุทธิ</span>
            <span data-field="summary-grand-total" class="text-2xl font-bold text-emerald-700"></span>
          </div>
        </div>
      </div>

      <!-- Image Grid -->
      <div class="mt-4">
        <p class="text-sm font-semibold mb-2">รูปถ่ายรายงานความก้าวหน้าหน้างาน:</p>
        <div data-field="image-grid" class="grid grid-cols-2 gap-2"></div>
      </div>
    </div>
  </template>

  <script src="js/main.js?v=2.3"></script>
</body>
</html>
