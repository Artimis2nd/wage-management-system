<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบันทึกค่าแรงคนงาน - จัดการคนงาน</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=2.1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Sarabun', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col pb-20 md:pb-5">

  <!-- Header / Navigation -->
  <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold flex items-center gap-2 hover:text-blue-100 transition-all">
        <i class="fa-solid fa-arrow-left"></i>
        <span>จัดการรายชื่อคนงาน</span>
      </a>
      <span id="sync-status" class="text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-medium">
        <i class="fa-solid fa-cloud"></i>
        <span>...</span>
      </span>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="max-w-6xl mx-auto px-4 py-6 flex-grow w-full">
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- คอลัมน์ซ้าย: ฟอร์มเพิ่ม/แก้ไขคนงาน -->
      <div class="lg:col-span-1">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 sticky top-24">
          <h2 id="form-title" class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-600">
            <i class="fa-solid fa-user-plus"></i>
            <span>เพิ่มคนงานใหม่</span>
          </h2>
          
          <form id="worker-form" class="space-y-4">
            <!-- ซ่อน ID สำหรับเคสแก้ไขข้อมูล -->
            <input type="hidden" id="worker-id">

            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
              <input type="text" id="worker-name" placeholder="ตัวอย่าง: สมชาย ใจดี" required 
                     class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">เบอร์โทรศัพท์ / ข้อมูลติดต่อ</label>
              <input type="text" id="worker-contact" placeholder="ตัวอย่าง: 081-234-5678" 
                     class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">ค่าแรงขั้นต้นรายวัน (บาท) <span class="text-red-500">*</span></label>
              <input type="number" id="worker-wage" placeholder="ตัวอย่าง: 500" required min="0" step="any"
                     class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div class="flex gap-2 pt-2">
              <button type="submit" id="btn-submit-worker" class="flex-grow bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl shadow-md transition-all text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูล
              </button>
              <button type="button" id="btn-cancel-edit" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium py-2.5 px-4 rounded-xl transition-all text-sm">
                ยกเลิก
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- คอลัมน์ขวา: รายชื่อคนงานทั้งหมดที่มีในระบบ -->
      <div class="lg:col-span-2">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
              <i class="fa-solid fa-address-book text-blue-600"></i>
              <span>รายชื่อคนงานทั้งหมด</span>
            </h2>
            <span id="worker-count" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-1 rounded-full">0 คน</span>
          </div>

          <!-- ตารางแสดงรายชื่อ (สำหรับจอคอมพิวเตอร์) -->
          <div class="overflow-x-auto rounded-xl border border-slate-100 hidden md:block">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-50 text-slate-600 text-xs uppercase font-semibold border-b border-slate-100">
                  <th class="py-3 px-4">ชื่อ-นามสกุล</th>
                  <th class="py-3 px-4">เบอร์โทรศัพท์</th>
                  <th class="py-3 px-4 text-right">ค่าแรงเริ่มต้น</th>
                  <th class="py-3 px-4 text-center">จัดการ</th>
                </tr>
              </thead>
              <tbody id="workers-table-body" class="divide-y divide-slate-100 text-sm">
                <tr>
                  <td colspan="4" class="text-center py-8 text-slate-400">กำลังโหลดรายชื่อคนงาน...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- รายการแสดงผลสำหรับมือถือ (แสดงเป็นการ์ดแทนตาราง) -->
          <div id="workers-mobile-list" class="space-y-3 md:hidden">
            <div class="text-center py-8 text-slate-400">กำลังโหลดรายชื่อคนงาน...</div>
          </div>

        </div>
      </div>

    </div>

  </main>

  <!-- Mobile Bottom Tab Bar (เมนูด้านล่างสุด) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg px-4 py-2 flex justify-around md:hidden z-50">
    <a href="index.html" class="flex flex-col items-center text-slate-400 hover:text-blue-500">
      <i class="fa-solid fa-house text-lg"></i>
      <span class="text-[10px] mt-1 font-medium">หน้าแรก</span>
    </a>
    <a href="daily-log.html" class="flex flex-col items-center text-slate-400 hover:text-blue-500">
      <i class="fa-solid fa-calendar-day text-lg"></i>
      <span class="text-[10px] mt-1 font-medium">รายวัน</span>
    </a>
    <a href="report.html" class="flex flex-col items-center text-slate-400 hover:text-blue-500">
      <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
      <span class="text-[10px] mt-1 font-medium">รายงาน</span>
    </a>
  </nav>

  <!-- เชื่อมโยงสคริปต์หลักของแอป -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/api.js?v=2.1"></script>
  <script src="js/main.js?v=2.1"></script>
</body>
</html>
