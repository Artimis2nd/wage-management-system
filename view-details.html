<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดใบงาน - ระบบบันทึกค่าแรง</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=2.5">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Sarabun', sans-serif;
    }
    @media print {
      .no-print { display: none; }
      body { background-color: white; }
      main { max-width: 100%; padding: 0; }
      .print-container { box-shadow: none; border: none; }
      .print-item-block {
        break-inside: avoid; /* พยายามไม่ให้เนื้อหาของรายการนี้ถูกตัดขึ้นหน้าใหม่ */
        break-after: page;   /* เมื่อจบรายการนี้ ให้ขึ้นหน้าใหม่เสมอ */
        page-break-after: page; /* สำหรับเบราว์เซอร์รุ่นเก่า */
      }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50 no-print">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold flex items-center gap-2 hover:text-blue-100 transition-all">
        <i class="fa-solid fa-arrow-left"></i>
        <span>รายละเอียดใบงานและรูปภาพ</span>
      </a>
      <span id="sync-status" class="text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-medium">
        <i class="fa-solid fa-cloud"></i>
        <span>...</span>
      </span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-6 flex-grow w-full">
    <div class="flex justify-end mb-4 no-print">
        <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2 px-5 rounded-lg text-sm transition-all flex items-center gap-2">
            <i class="fa-solid fa-print"></i> พิมพ์หน้านี้
        </button>
    </div>

    <div id="details-content" class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 print-container">
      <!-- Content will be injected here by JavaScript -->
      <div class="text-center py-20 text-slate-400">
        <i class="fa-solid fa-spinner fa-spin text-3xl"></i>
        <p class="mt-3">กำลังโหลดข้อมูลใบงาน...</p>
      </div>
    </div>
  </main>

  <!-- App Scripts -->
  <script src="js/api.js?v=2.5"></script>
  <script src="js/main.js?v=2.5"></script>
</body>
</html>
